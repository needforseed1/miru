name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            mpv \
            zlib1g-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4.3.1
        with:
          version: '6.8.*'
          modules: 'qtimageformats'

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: QML lint
        run: cmake --build build --target miru_qmllint
